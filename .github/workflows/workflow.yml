name: QA VT Batch Execution

on:
  push:
    branches:
      - main
      - master

# 🔐 ICI : On dit au runner de tolérer le certificat du réseau d'entreprise
env:
  NODE_TLS_REJECT_UNAUTHORIZED: "0"
  PYTHONIOENCODING: "utf-8"

jobs:
  run-qa-batch:
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Run QA_launcher.bat
        run: .\QA_launcher.bat
        shell: cmd

      - name: 📦 Upload Reports (Artifacts)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-reports-${{ github.run_id }}
          path: .\_results\
